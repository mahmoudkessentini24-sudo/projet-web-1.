<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="../css/contact.css">
  <title>Contact - Mahmoud</title>
</head>
<body>
  <header>
    <a href="../index.html" class="logo">Mahmoud</a>
    <nav>
      <a href="../index.html">Home</a>
      <a href="education.html">Education</a>
      <a href="skills.html">Compétences</a>
      <a href="experience.html">Experience</a>
      <a href="matière.html">Matières</a>
      <a href="passion.html">Passions</a>
      <a href="Quiz.html">Quiz</a>
      <a href="contact.html" class="active">Contact</a>
      <a href="temoignages.html">Témoignages</a>
    </nav>
  </header>

  <main class="contact-container">
    <section class="contact-hero">
      <h1>Me <span>Contacter</span></h1>
      <p>Envoyez-moi un message — je répondrai dès que possible.</p>
    </section>

    <div class="contact-wrapper">
      <div class="contact-info">
        <div class="info-card">
          <div class="info-icon">
            <i class="fas fa-envelope"></i>
          </div>
          <h3>Email</h3>
          <p><a href="https://mail.google.com/mail/u/0/#inbox?compose=DmwnWsTNHwFcFZzPZnNCZWzpcXFSNwZHXKKlCBPDSQHBLGPpWqGQqFpMsvnrzMkMtctdjbxPqwtb" target="_blank">mahmoudkessentini24@gmail.com</a></p>
        </div>

        <div class="info-card">
          <div class="info-icon">
            <i class="fas fa-map-marker-alt"></i>
          </div>
          <h3>Localisation</h3>
          <p>Sfax, Tunisie</p>
        </div>

        <div class="info-card">
          <div class="info-icon">
            <i class="fas fa-phone"></i>
          </div>
          <h3>Téléphone</h3>
          <p><a href="tel:+21693947425">+216 93 947 425</a></p>
        </div>

        <div class="social-links">
          <a href="https://www.linkedin.com/in/mkessentini/" title="LinkedIn" target="_blank"><i class="fab fa-linkedin"></i></a>
          <a href="https://www.facebook.com/mahmoud.kessentini.2025/" title="facebook" target="_blank"><i class="fab fa-facebook"></i></a>
          <a href="https://www.instagram.com/mahmoud_kessentini/" title="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
      </div>

      <form id="contactForm" class="contact-form">
        <div class="form-group">
          <label for="name">Nom</label>
          <input type="text" id="name" name="name" required minlength="2" placeholder="Votre nom"/>
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required placeholder="votre@email.com"/>
        </div>

        <div class="form-group">
          <label for="subject">Sujet</label>
          <input type="text" id="subject" name="subject" required placeholder="Objet du message"/>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required minlength="5" placeholder="Votre message..."></textarea>
        </div>

       <a href="mailto:mahmoudkessentini24@gmail.com"> <button type="submit" class="btn-submit">
          <i class="fas fa-paper-plane"></i> Envoyer le message
        </button></a>
        <div id="status" class="form-status" role="status" aria-live="polite"></div>
      </form>
    </div>
  </main>

  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      status.textContent = 'Envoi en cours...';
      status.className = 'form-status loading';

      const data = Object.fromEntries(new FormData(form).entries());

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const json = await res.json();
        if (res.ok) {
          status.textContent = '✅ Message envoyé avec succès !';
          status.className = 'form-status success';
          form.reset();
          setTimeout(() => { status.textContent = ''; }, 3000);
        } else {
          status.textContent = '❌ ' + (json?.error || 'Erreur lors de l\'envoi');
          status.className = 'form-status error';
        }
      } catch (err) {
        status.textContent = '❌ Erreur réseau — impossible d\'envoyer';
        status.className = 'form-status error';
      }
    });
  </script>
</body>
</html>
